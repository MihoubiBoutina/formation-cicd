name: CI — build, test, package

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - run: npm test

  build:
    name: Build container
    needs: test
    runs-on: ubuntu-latest   # Changé de 'self-hosted' à 'ubuntu-latest' pour utiliser les machines GitHub
    steps:
      - uses: actions/checkout@v4
      - name: Simuler le build Docker
        run: echo "Ici, la machine fabrique l'image Docker de l'application de test !"