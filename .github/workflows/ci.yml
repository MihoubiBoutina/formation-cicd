name: CI — build, test, package

# --- QUAND s'exécute le workflow --------------------------
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 3 * * 1'   # tous les lundis à 3h
  workflow_dispatch:      # déclenchement manuel via UI

# --- VARIABLES globales du workflow ------------------------
env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io

# --- PERMISSIONS du GITHUB_TOKEN (least privilege) --------
permissions:
  contents: read
  packages: write
  id-token: write      # pour OIDC

# --- JOBS -------------------------------------------------
jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm test -- --coverage

  build:
    needs: test              # séquentiel après test
    runs-on: ubuntu-latest   # Modifié ici temporairement de 'self-hosted' à 'ubuntu-latest' pour que votre premier test fonctionne sans serveur !
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with:
          push: false        # Modifié ici temporairement sur 'false' pour éviter de bloquer sur les accès du registre
          tags: ${{ env.REGISTRY }}/${{ github.repository }}:${{ github.sha }}